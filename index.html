<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Топ Участников</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #eef2f3; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #34495e; color: white; border-radius: 4px 4px 0 0; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:first-child td { background-color: #ffeaa7; font-weight: bold; } /* Лидер */
        .form-group { margin-top: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        button:hover { background: #27ae60; }
        .admin-section { margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏆 Лидеры за сегодня</h2>
    <table id="leaderboard">
        <thead>
            <tr>
                <th>Место</th>
                <th>Имя</th>
                <th>Время (сек)</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="3" style="text-align:center;">Загрузка данных...</td></tr>
        </tbody>
    </table>

    <h2 style="margin-top: 40px;">⏱ Внести время</h2>
    <form id="timeForm">
        <div class="form-group">
            <label>Выберите участника:</label>
            <select id="userSelect" required></select>
        </div>

        <div id="tasksInputContainer"></div>

        <button type="submit">Отправить результат</button>
    </form>

    <!-- ПАНЕЛЬ АДМИНИСТРАТОРА ПРЯМО НА САЙТЕ -->
    <div class="admin-section">
        <h3>⚙️ Настройки (Админ)</h3>
        <div class="form-group">
            <label>Участники (через запятую):</label>
            <input type="text" id="usersConfig" value="Андрей, Сергей, Алексей">
        </div>
        <div class="form-group">
            <label>Задачи (через запятую):</label>
            <input type="text" id="tasksConfig" value="Задача 1, Задача 2, Задача 3, Задача 4, Задача 5">
        </div>
        <button type="button" onclick="saveConfig()" style="background:#3498db;">Обновить списки</button>
    </div>
</div>

<script>
    // ВСТАВЬ СВОЮ ССЫЛКУ ИЗ GOOGLE МЕЖДУ КАВЫЧКАМИ:
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwNRsULrBa5gOCEOVCmTa_Y1MijToD4Np6gp5pBcs15kBsaVw6zWnPDhRPii511d40D/exec"; 

    // Загрузка настроек из памяти браузера (чтобы можно было легко менять)
    let users = localStorage.getItem('users') ? localStorage.getItem('users').split(',') : ["Андрей", "Сергей", "Алексей"];
    let tasks = localStorage.getItem('tasks') ? localStorage.getItem('tasks').split(',') : ["Задача 1", "Задача 2", "Задача 3", "Задача 4", "Задача 5"];

    function initSite() {
        // Заполняем выпадающий список пользователей
        const select = document.getElementById('userSelect');
        select.innerHTML = users.map(u => `<option value="${u.trim()}">${u.trim()}</option>`).join('');
        
        document.getElementById('usersConfig').value = users.join(', ');
        document.getElementById('tasksConfig').value = tasks.join(', ');

        // Генерируем поля для задач
        const container = document.getElementById('tasksInputContainer');
        container.innerHTML = tasks.map((t, index) => `
            <div class="form-group">
                <label>${t.trim()} (секунд):</label>
                <input type="number" class="task-input" data-index="${index+1}" required min="0">
            </div>
        `).join('');
        
        loadLeaderboard();
    }

    function saveConfig() {
        localStorage.setItem('users', document.getElementById('usersConfig').value);
        localStorage.setItem('tasks', document.getElementById('tasksConfig').value);
        alert('Списки обновлены!');
        location.reload();
    }

    // Загрузка топа из Google Таблицы
    async function loadLeaderboard() {
        try {
            const todayStr = new Date().toLocaleDateString("ru-RU");
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            
            // Фильтруем только за сегодня
            const todayData = data.filter(item => item.date.includes(todayStr) || new Date(item.date).toLocaleDateString("ru-RU") === todayStr);
            
            // Сортируем от лучшего к худшему (по возрастанию секунд)
            todayData.sort((a, b) => a.total - b.total);

            const tbody = document.querySelector('#leaderboard tbody');
            if(todayData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;">Сегодня еще никто не вносил результаты</td></tr>`;
                return;
            }

            tbody.innerHTML = todayData.map((item, idx) => `
                <tr>
                    <td>${idx + 1}</td>
                    <td>${item.name}</td>
                    <td>${item.total} сек</td>
                </tr>
            `).join('');
        } catch (e) {
            document.querySelector('#leaderboard tbody').innerHTML = `<tr><td colspan="3" style="text-align:center;color:red;">Ошибка обновления данных</td></tr>`;
        }
    }

    // Отправка формы
    document.getElementById('timeForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const payload = {
            name: document.getElementById('userSelect').value,
            t1: document.querySelector('[data-index="1"]')?.value || 0,
            t2: document.querySelector('[data-index="2"]')?.value || 0,
            t3: document.querySelector('[data-index="3"]')?.value || 0,
            t4: document.querySelector('[data-index="4"]')?.value || 0,
            t5: document.querySelector('[data-index="5"]')?.value || 0,
        };

        document.querySelector('#timeForm button').innerText = "Отправка...";

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert('Успешно отправлено!');
            document.getElementById('timeForm').reset();
            setTimeout(loadLeaderboard, 1500);
        } catch(err) {
            alert('Ошибка при отправке');
        } finally {
            document.querySelector('#timeForm button').innerText = "Отправить результат";
        }
    });

    initSite();
</script>
</body>
</html>
